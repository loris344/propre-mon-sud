name: Keepalive (anti-désactivation du cron à 60 jours)

# GitHub désactive automatiquement un workflow PLANIFIÉ après 60 jours sans
# activité sur la branche par défaut. Le déploiement quotidien (deploy.yml)
# pousse sur gh-pages mais ne commite jamais sur main → sans ce keepalive, le
# cron de publication se couperait en silence vers mi-août, et le goutte-à-goutte
# (qui court jusqu'au ~16/10) gèlerait avant la fin.
#
# Solution : un commit vide sur main une fois par mois. `contents: write` suffit
# (on n'utilise PAS actions:write/issues:write, refusés au token sur ce repo).
# Le push par le GITHUB_TOKEN ne déclenche volontairement aucun autre workflow
# (pas de cascade), il sert uniquement à garder le dépôt « actif ».

on:
  schedule:
    - cron: '0 4 1 * *'   # le 1er de chaque mois à 04:00 UTC
  workflow_dispatch:        # déclenchement manuel possible (onglet Actions)

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Commit vide pour maintenir le dépôt actif
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive (maintien du cron de publication)"
          git push

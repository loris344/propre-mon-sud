name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  # Rebuild quotidien : fait passer en ligne les pages dont la date de
  # publication (publishAt) est atteinte, sans aucune édition manuelle.
  # Plusieurs créneaux/jour à des minutes hors :00 (les minutes pile sont les
  # plus saturées chez GitHub, donc les plus souvent sautées). Le build est
  # idempotent : relancer plusieurs fois ne publie que les pages dues, sans
  # risque. Multiplier les tentatives maximise la probabilité qu'au moins une
  # passe chaque jour. Reste "best-effort" côté GitHub : le seul déclenchement
  # GARANTI est un cron externe (cron-job.org) tapant workflow_dispatch.
  schedule:
    - cron: '13 5 * * *'    # ~07:13 Paris
    - cron: '37 8 * * *'    # ~10:37 Paris
    - cron: '23 13 * * *'   # ~15:23 Paris
  # Déclenchement manuel possible depuis l'onglet Actions (bouton « Run workflow »).
  workflow_dispatch:

# IMPORTANT (diagnostic 12/06/2026) : ne demander QUE `contents: write`.
# Demander `actions: write` (keepalive) ou `issues: write` (issue d'alerte) au
# GITHUB_TOKEN faisait échouer le step « Set up job » avec « Repository access
# blocked » sur ce dépôt. Le keepalive anti-désactivation-60j et l'alerte d'échec
# sont à réintégrer SANS ces scopes (keepalive en mode commit = contents:write).
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'

    # `npm ci` : installation reproductible depuis le lockfile.
    - name: Install dependencies
      run: npm ci --include=optional --legacy-peer-deps

    - name: Build
      run: npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        enable_jekyll: false

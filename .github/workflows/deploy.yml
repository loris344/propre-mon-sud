name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  # Pas de `schedule:` GitHub (best-effort, non fiable). Le déclenchement quotidien
  # est assuré par un cron EXTERNE (cron-job.org) qui appelle l'API workflow_dispatch
  # ci-dessous, une fois par jour. workflow_dispatch sert donc au cron externe ET au
  # bouton manuel « Run workflow » de l'onglet Actions.
  workflow_dispatch:

# IMPORTANT (diagnostic 12/06/2026) : ne demander QUE `contents: write`.
# Demander `actions: write` (keepalive) ou `issues: write` (issue d'alerte) au
# GITHUB_TOKEN faisait échouer le step « Set up job » avec « Repository access
# blocked » sur ce dépôt. Le keepalive anti-désactivation-60j et l'alerte d'échec
# sont à réintégrer SANS ces scopes (keepalive en mode commit = contents:write).
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        cache: 'npm'

    # `npm ci` : installation reproductible depuis le lockfile.
    - name: Install dependencies
      run: npm ci --include=optional --legacy-peer-deps

    - name: Build
      run: npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        enable_jekyll: false
